name: release

# Cut a release by pushing a v<x.y.z> tag. Before tagging:
#   - build.zig.zon `.version` equals the tag (the build job enforces this).
#   - CHANGELOG.md has a dated section for the version; its body becomes the
#     release notes.
# Push main, watch ci go green on every platform, then tag. The test job below
# re-runs the suite on the tagged commit across all platforms and gates the
# build, so a tag on an untested commit cannot publish.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  # Re-run the full suite on every platform for the exact tagged commit, so a
  # tag on an untested commit cannot publish a broken build even if ci was not
  # watched to green first. build-and-release waits on this.
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: install zig (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   triple=x86_64-linux ;;
            Linux-ARM64) triple=aarch64-linux ;;
            macOS-ARM64) triple=aarch64-macos ;;
            macOS-X64)   triple=x86_64-macos ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-${triple}-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-${triple}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: install zig (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/zig-x86_64-windows-$env:ZIG_VERSION.zip"
          $dst = Join-Path $env:USERPROFILE 'zig'
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Invoke-WebRequest -Uri $url -OutFile zig.zip
          Expand-Archive -LiteralPath zig.zip -DestinationPath $dst
          "$dst\zig-x86_64-windows-$env:ZIG_VERSION" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: test
        run: zig build test --summary all

  # One job cross-compiles every target (Zig cross-compiles from Linux), packages
  # them, writes SHA256SUMS, and publishes -- so no artifacts pass between jobs.
  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Fail before the build if the tag, build.zig.zon, and CHANGELOG.md
      # disagree, or the changelog section is missing. Cheapest gate first.
      - name: verify version and extract notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          zon_version="$(sed -n 's/^[[:space:]]*\.version = "\(.*\)",/\1/p' build.zig.zon)"
          if [ "$version" != "$zon_version" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match build.zig.zon version $zon_version" >&2
            exit 1
          fi
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "CHANGELOG.md has no non-empty section for $version" >&2
            exit 1
          fi

      - name: install zig
        shell: bash
        run: |
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: build, package, and checksum every target
        shell: bash
        run: |
          set -euo pipefail
          dist="$(pwd)/dist"
          mkdir -p "$dist"
          # target : asset-basename
          set -- \
            aarch64-macos:mox-aarch64-macos \
            x86_64-macos:mox-x86_64-macos \
            x86_64-linux-musl:mox-x86_64-linux \
            aarch64-linux-musl:mox-aarch64-linux \
            x86_64-windows:mox-x86_64-windows
          for pair in "$@"; do
            target="${pair%%:*}"; asset="${pair##*:}"
            echo "== $target -> $asset =="
            rm -rf zig-out
            zig build -Dtarget="$target" -Doptimize=ReleaseSafe
            pkg="$(mktemp -d)"
            cp LICENSE README.md "$pkg/"
            case "$target" in
              *windows*)
                cp zig-out/bin/mox.exe "$pkg/"
                (cd "$pkg" && zip -qr "$dist/${asset}.zip" .)
                ;;
              *)
                cp zig-out/bin/mox "$pkg/"
                tar -czf "$dist/${asset}.tar.gz" -C "$pkg" .
                ;;
            esac
            rm -rf "$pkg"
          done
          cd "$dist"
          sha256sum mox-* > SHA256SUMS
          echo "== dist =="; ls -la; echo "== SHA256SUMS =="; cat SHA256SUMS

      # Publish with softprops (third-party) pinned to a commit SHA, not a movable
      # tag, so a compromised or retagged release cannot run with this job's
      # contents:write token. SHA is v3.0.2.
      - name: create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: dist/*
          fail_on_unmatched_files: true
