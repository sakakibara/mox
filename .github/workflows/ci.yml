name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly bounded fuzz run of the DSL parse pipeline and ini_merge.
    - cron: "0 4 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # A wedged test must fail the job, not sit on a runner for six hours.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: install zig (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   triple=x86_64-linux ;;
            Linux-ARM64) triple=aarch64-linux ;;
            macOS-ARM64) triple=aarch64-macos ;;
            macOS-X64)   triple=x86_64-macos ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-${triple}-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-${triple}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: install zig (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/zig-x86_64-windows-$env:ZIG_VERSION.zip"
          $dst = Join-Path $env:USERPROFILE 'zig'
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Invoke-WebRequest -Uri $url -OutFile zig.zip
          Expand-Archive -LiteralPath zig.zip -DestinationPath $dst
          "$dst\zig-x86_64-windows-$env:ZIG_VERSION" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: format check
        run: zig fmt --check build.zig src tests
      - name: build
        run: zig build
      - name: test
        run: zig build test --summary all

  fuzz:
    # Nightly only. Exercises the fuzz targets (tests/fuzz_test.zig) under a
    # wall-clock bound. Continuous fuzzing (`zig build fuzz --fuzz`) is gated
    # on an upstream Zig 0.16.0 test-runner fix; until then this runs the
    # targets as bounded smoke checks so a regression that crashes them fails
    # the nightly rather than hanging.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install zig
        shell: bash
        run: |
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: fuzz (bounded)
        run: timeout 600 zig build fuzz
